name: StudentManagement API CI

on:
  push:
    branches:
      - main
      - feature/**
      - develop

    pull_request:
      branch:
        - main
        - develop

jobs:
  build-test-publish:
    name: Built, Test and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v5

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Dependencies
        uses: dotnet restore StudentManagement.API.slnx

      - name: Build solution
        run: dotnet build StudentManagement.API.sln --configuration Release --no-restore

      - name: Run Tests
        uses: dotnet test StudentManagement.API.slnx --configuration Release --no-build --verbosity normal

      - name: Publish Web API
        uses: dotnet puslibh StudentManagement.API/StudentManagement.API.csproj --configuration Release --output ./publish --no-build

      - name: Upload Publish Artifact
        uses: actions/upload-artiface@v6
        with:
          name: studentmanagement-api-publish
          path: ./publish
